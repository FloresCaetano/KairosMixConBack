name: CD

on:
  push:
    tags:
      - "v*"
  release:
    types: [ published ]
  workflow_dispatch: {}

permissions:
  contents: read
  packages: write

concurrency:
  group: cd-${{ github.ref }}
  cancel-in-progress: false

env:
  IMAGE_NAME: kairosmix-backend

jobs:
  docker:
    name: Build & Push Docker Image (GHCR)
    runs-on: ubuntu-latest
    outputs:
      has_deploy_config: ${{ steps.deploy_gate.outputs.has_deploy_config }}

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Log in to GHCR
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Extract Docker metadata
        id: meta
        uses: docker/metadata-action@v5
        with:
          images: ghcr.io/${{ github.repository_owner }}/${{ env.IMAGE_NAME }}
          tags: |
            type=ref,event=tag
            type=semver,pattern={{version}}
            type=semver,pattern={{major}}.{{minor}}
            type=raw,value=latest,enable={{is_default_branch}}

      - name: Build and push
        uses: docker/build-push-action@v6
        with:
          context: ./KairosMix-Backend
          push: true
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}
          cache-from: type=gha
          cache-to: type=gha,mode=max

      - name: Check deploy configuration
        id: deploy_gate
        shell: bash
        env:
          DEPLOY_HOST: ${{ secrets.DEPLOY_HOST }}
          DEPLOY_USER: ${{ secrets.DEPLOY_USER }}
          DEPLOY_SSH_KEY: ${{ secrets.DEPLOY_SSH_KEY }}
          DEPLOY_SCRIPT: ${{ secrets.DEPLOY_SCRIPT }}
        run: |
          if [[ -n "$DEPLOY_HOST" && -n "$DEPLOY_USER" && -n "$DEPLOY_SSH_KEY" && -n "$DEPLOY_SCRIPT" ]]; then
            echo "has_deploy_config=true" >> "$GITHUB_OUTPUT"
          else
            echo "has_deploy_config=false" >> "$GITHUB_OUTPUT"
          fi

  deploy:
    name: Deploy (Optional SSH)
    runs-on: ubuntu-latest
    needs: docker
    if: ${{ needs.docker.outputs.has_deploy_config == 'true' }}

    steps:
      - name: Deploy via SSH
        uses: appleboy/ssh-action@v1.2.0
        with:
          host: ${{ secrets.DEPLOY_HOST }}
          username: ${{ secrets.DEPLOY_USER }}
          key: ${{ secrets.DEPLOY_SSH_KEY }}
          script: ${{ secrets.DEPLOY_SCRIPT }}
